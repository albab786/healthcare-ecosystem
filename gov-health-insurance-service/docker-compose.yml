version: '3.8'

services:
  insurance-db:
    image: postgres:15-alpine
    container_name: insurance-postgres-container
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=insurance_db
    ports:
      - "5434:5432" # Exposed on 5434
    volumes:
      - insurance_pgdata:/var/lib/postgresql/data
    networks:
      - insurance-network

  insurance-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gov-health-insurance-app
    ports:
      - "8082:8082"
    restart: always
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://insurance-db:5432/insurance_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      # 🚀 Route through your local machine host so it can jump over to port 8081
      - REGISTRY_SERVICE_URL=http://host.docker.internal:8081
    depends_on:
      - insurance-db
    networks:
      - insurance-network
    # Required for Windows/Mac to map host.docker.internal properly inside the container
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  insurance_pgdata:

networks:
  insurance-network:
    driver: bridge