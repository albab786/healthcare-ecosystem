server:
  port: 8082

spring:
  datasource:
    # 🚀 Points to localhost:5434 when running locally in your IDE
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/insurance_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect